name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # Linux aarch64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # Linux armv7
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gatel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            gatel gatel-passwd gatel-precompress 2>/dev/null || \
          tar czf ../../../gatel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            gatel
        shell: bash

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../gatel-${{ github.ref_name }}-${{ matrix.target }}.zip `
            gatel.exe gatel-passwd.exe gatel-precompress.exe
        shell: pwsh

      - name: Smoke test
        if: ${{ !matrix.cross }}
        run: |
          ./target/${{ matrix.target }}/release/gatel${{ matrix.os == 'windows-latest' && '.exe' || '' }} --help
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: gatel-${{ matrix.target }}
          path: gatel-${{ github.ref_name }}-${{ matrix.target }}.*

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Distroless image
      - name: Build and push (distroless)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Alpine image
      - name: Build and push (alpine)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.alpine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:alpine
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}-alpine
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deb:
    name: Debian package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: gatel-x86_64-unknown-linux-gnu
          path: dist/

      - name: Extract binary
        run: tar xzf dist/gatel-*.tar.gz -C dist/

      - name: Build DEB
        run: bash packaging/deb/build.sh dist/gatel ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: gatel-deb
          path: "*.deb"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker, deb]
    permissions:
      contents: write
      id-token: write  # for cosign signing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' | \
            xargs -I {} cp {} release/

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: release/gatel-${{ github.ref_name }}-sbom.spdx.json
          format: spdx-json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt

      - name: Sign checksums with cosign (keyless)
        run: cosign sign-blob --yes release/checksums-sha256.txt --output-signature release/checksums-sha256.txt.sig
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish gatel-core
        run: cargo publish -p gatel-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish gatel
        run: cargo publish -p gatel --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish gatel-passwd
        run: cargo publish -p gatel-passwd --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish gatel-precompress
        run: cargo publish -p gatel-precompress --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
