upstream backend_upstream {
    server backend:8080;
    keepalive 128;
}

server {
    listen 8080;
    server_name _;
    access_log off;
    keepalive_timeout 65;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_pass http://backend_upstream;
    }
}
