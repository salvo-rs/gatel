services:
  gatel:
    build:
      context: ../..
      dockerfile: Dockerfile.alpine
    volumes:
      - ./gatel.kdl:/etc/gatel/gatel.kdl:ro
    expose:
      - "8080"

  backend:
    image: nginx:alpine
    volumes:
      - ./backend.conf:/etc/nginx/conf.d/default.conf:ro

  test-runner:
    image: curlimages/curl:latest
    depends_on:
      - gatel
      - backend
    entrypoint: ["/bin/sh", "/tests/test.sh"]
    volumes:
      - ./test.sh:/tests/test.sh:ro
